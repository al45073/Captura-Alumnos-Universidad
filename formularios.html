<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modificación de Alumnos</title>
    <style>
        body {
            background-color: limegreen;
        }
    </style>
</head>
<body>

<h1>MODIFICACIÓN DE ALUMNOS</h1>

<form>

    <label>Apellido Paterno:</label>
    <input type="text" name="apellidoPaterno">
    <br><br>

    <label>Apellido Materno:</label>
    <input type="text" name="apellidoMaterno">
    <br><br>

    <label>Nombre del Alumno:</label>
    <input type="text" name="nombre">
    <br><br>

    <label>ID Carrera:</label>
    <input type="number" name="idCarrera">
    
    <label>Carrera:</label>
    <select name="carrera">
        <option>Ing. en Tecnologias de la Informacion/Comunciaciones</option>
        <option>Ing. en Tecnologias de la Informacion/Software</option>
        <option>Ing. Industrial Administrador</option>
        <option>Ing. Mecanico Administrador</option>
        <option>Ing. Industrial y de Sistemas</option>
        <option>Lic. en Admin. de Tecnolgias de la Informacion</option>
    </select>
    <br><br>

    <label>ID Sistema Educativo:</label>
    <input type="number" name="idSistema">

    <label>Sistema Educativo:</label>
    <select name="sistema">
        <option>Sistema Tradicional</option>
        <option>Sistema Modalidad Virtual</option>
    </select>
    <br><br>

    <label>Teléfono:</label>
    <input type="text" name="telefono">
    <br><br>

    <label>Celular:</label>
    <input type="text" name="celular">
    <br><br>

    <label>Email:</label>
    <input type="email" name="email">
    <br><br>

    <label>Dirección:</label>
    <input type="text" name="direccion">
    <br><br>

    <label>Colonia:</label>
    <input type="text" name="colonia">
    <br><br>

    <label>Población:</label>
    <input type="text" name="poblacion">
    <br><br>

    <label>CP:</label>
    <input type="number" name="cp">
    <br><br>

    <label>ID Estado:</label>
    <input type="number" name="idEstado">

    <label>Estado:</label>
    <select name="estado">
        <option>Nuevo León</option>
        <option>Coahuila</option>
        <option>Tamaulipas</option>
    </select>
    <br><br>

    <label>Empresa:</label>
    <input type="text" name="empresa">
    <br><br>

    <label>Fecha de Nacimiento:</label>
    <input type="date" name="fechaNacimiento">
    <br><br>

    <label>Fecha de Ingreso:</label>
    <input type="date" name="fechaIngreso">
    <br><br>

    <label>CURP:</label>
    <input type="text" name="curp" maxlength="18">
    <br><br>

    <label>Escuela de Procedencia:</label>
    <input type="text" name="escuelaProcedencia">
    <br><br>

    <label>ID Estado donde estudió:</label>
    <input type="number" name="idEstadoPrepa">

    <label>Estado:</label>
    <select name="estadoPrepa">
    <option>Nuevo León</option>
    <option>Coahuila</option>
    <option>Tamaulipas</option>
    </select>

    <label>Fotografía:</label>
    <input type="file" name="foto">
    <br><br>

    <input type="submit" value="Guardar">
    <input type="reset" value="Limpiar">
    <br><br>
</form>

</body>
</html>
